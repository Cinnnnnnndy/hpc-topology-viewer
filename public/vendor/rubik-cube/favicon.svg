<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 逻辑魔方 favicon：等距立方三面 = DP(蓝)/TP(青)/PP(橙)，点一格 EP 紫、一格热点红 -->
  <g stroke="#10151f" stroke-width="0.9" stroke-linejoin="round">
    <!-- 顶面 · DP 蓝 + EP 紫 -->
    <polygon points="16,3 22,6.5 16,10 10,6.5" fill="#4369EF"/>
    <polygon points="22,6.5 28,10 22,13.5 16,10" fill="#9B3CF6"/>
    <polygon points="16,10 22,13.5 16,17 10,13.5" fill="#4369EF"/>
    <polygon points="10,6.5 16,10 10,13.5 4,10" fill="#4369EF"/>
    <!-- 左面 · TP 青 + 一格状态绿 -->
    <polygon points="4,10 10,13.5 10,20.5 4,17" fill="#39c5cf"/>
    <polygon points="10,13.5 16,17 16,24 10,20.5" fill="#39c5cf"/>
    <polygon points="4,17 10,20.5 10,27.5 4,24" fill="#04d793"/>
    <polygon points="10,20.5 16,24 16,31 10,27.5" fill="#39c5cf"/>
    <!-- 右面 · PP 橙 + 一格热点红 -->
    <polygon points="16,17 22,13.5 22,20.5 16,24" fill="#FFAA3B"/>
    <polygon points="22,13.5 28,10 28,17 22,20.5" fill="#FFAA3B"/>
    <polygon points="16,24 22,20.5 22,27.5 16,31" fill="#ff4b7b"/>
    <polygon points="22,20.5 28,17 28,24 22,27.5" fill="#FFAA3B"/>
  </g>
</svg>
